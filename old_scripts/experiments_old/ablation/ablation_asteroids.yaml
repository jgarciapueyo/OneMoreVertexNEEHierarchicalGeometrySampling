# BVH ablation across several non-Disney geometries
docker:
  container: onemorevertexneehierarchicalgeometrysampling-mitsuba-1
  workdir: /home/mitsuba
  setpath_script: /home/mitsuba/setpath.sh

scene: scenes/2_wildcard_asteroids/wildcard_spotlight.xml
output_root: scenes/2_wildcard_asteroids/results/ablation_asteroids_highspp

reference:
  inherit_config_params: false
  # pre_rendered_exr: scenes/2_wildcard_asteroids/results/ablation_asteroids/baseline_path/reference.exr
  scene: scenes/2_wildcard_asteroids/wildcard_spotlight_pathref.xml
  spp: 16000
  

spp_schedule: [4, 8, 16] #, 32, 64, 128, 512] # , 16, 32, 64, 128, 512
repetitions_per_spp: 3
reference_spp: 16000

global_defaults:
  integrator: doublestep
  maxDepth: 3
  bvhMaxDepth: 16
  rrDepth: 5
  leafSamplingMode: SphericalAABB
  useBVH: true
  disableNEE: false
  doAdditionalVertex: true
  outputDebugCSV: false
  enableLightcuts: false
  lightcutThreshold: 1.5
  gaussianSAThreshold: 0.03141592
  useUniformBVHSampling: 1
  enableSpecular: 0
  enableFastLUT: 1
  defensivePDF: 0.000001

analysis:
  baseline_config_name: baseline_path
  average_bbox: [0.6, 0.4, 0.68, 0.5] # delimits the area used to check unbiasedness (this box is the bottom half of the image)

named_configs:
  - name: baseline_path
    params:
      __scene: scenes/2_wildcard_asteroids/wildcard_spotlight_pathref.xml
      integrator: path
      maxDepth: 3
      rrDepth: 5

  - name: spherical
    params:
      leafSamplingMode: SphericalAABB

  - name: primitive
    params:
      leafSamplingMode: Primitive
      

  - name: bvhdepth_24
    params:
      bvhMaxDepth: 24

  - name: bvhdepth_20
    params:
      bvhMaxDepth: 20

  - name: bvhdepth_20_fastlut
    params:
      bvhMaxDepth: 20
      enableFastLUT: 1

  - name: bvhdepth_14
    params:
      bvhMaxDepth: 14

  - name: uniform_on
    params:
      useUniformBVHSampling: 0

  - name: specular_on
    params:
      enableSpecular: 1

  - name: defensive_1e-8
    params:
      defensivePDF: 0.00000001

  - name: lightcuts1.5_Primitive
    params:
      leafSamplingMode: Primitive
      enableLightcuts: true
      lightcutThreshold: 1.5

  - name: lightcuts1.5_on_spherical
    params:
      leafSamplingMode: SphericalAABB
      enableLightcuts: true
      lightcutThreshold: 1.5

  - name: lightcuts1.5_on_spherical_anynode
    params:
      leafSamplingMode: SphericalAABB_anyNode
      enableLightcuts: true
      lightcutThreshold: 1.5

  - name: lightcuts1.1_Primitive
    params:
      leafSamplingMode: Primitive
      enableLightcuts: true
      lightcutThreshold: 1.1

  - name: lightcuts1.1_on_spherical
    params:
      leafSamplingMode: SphericalAABB
      enableLightcuts: true
      lightcutThreshold: 1.1

  - name: lightcuts1.1_on_spherical_anynode
    params:
      leafSamplingMode: SphericalAABB_anyNode
      enableLightcuts: true
      lightcutThreshold: 1.1

  - name: lightcuts10_Primitive
    params:
      leafSamplingMode: Primitive
      enableLightcuts: true
      lightcutThreshold: 10

  - name: lightcuts10_on_spherical
    params:
      leafSamplingMode: SphericalAABB
      enableLightcuts: true
      lightcutThreshold: 10

  - name: lightcuts10_on_spherical_anynode
    params:
      leafSamplingMode: SphericalAABB_anyNode
      enableLightcuts: true
      lightcutThreshold: 10
