# Disney-spec focused ablation with specular toggle + geometry variants
docker:
  container: bdpt_twopoints_mitsuba-mitsuba-1
  workdir: /home/mitsuba
  setpath_script: /home/mitsuba/setpath.sh

scene: scenes/experiments/3_wildcard_disney/wildcard_disney_quads.xml
output_root: scenes/experiments/3_wildcard_disney/results/ablation_disney_spec

reference:
  inherit_config_params: true
  scene: scenes/experiments/3_wildcard_disney/wildcard_disney_quads_pathref.xml
  spp: 8192
  exclude_params:
    - integrator
    - useBVH
    - disableNEE
    - doAdditionalVertex
    - leafSamplingMode
    - outputDebugCSV
    - enableLightcuts
    - lightcutThreshold
    - gaussianSAThreshold
    - useUniformBVHSampling
    - enableSpecular
    - enableFastLUT
    - defensivePDF

spp_schedule: [4, 8, 16, 32, 64]
repetitions_per_spp: 3

global_defaults:
  integrator: doublestep
  maxDepth: 3
  bvhMaxDepth: 4
  rrDepth: 5
  maxLeafSize: 2
  leafSamplingMode: SphericalAABB
  useBVH: true
  disableNEE: false
  doAdditionalVertex: true
  outputDebugCSV: false
  enableLightcuts: false
  lightcutThreshold: 0
  gaussianSAThreshold: 0.03141592
  useUniformBVHSampling: 1
  enableSpecular: 1
  enableFastLUT: 0
  defensivePDF: 0.000001
  geometry: quads-disney-spec0.5-rough0.05-k40.xml

analysis:
  baseline_config_name: baseline_path
  average_bbox: [0.3, 0.3, 0.7, 0.7]

named_configs:
  - name: baseline_path
    params:
      __scene: scenes/experiments/3_wildcard_disney/wildcard_disney_quads_pathref.xml
      integrator: path
      maxDepth: 3
      rrDepth: 5

  - name: disney_spec0.0_primitive
    params:
      geometry: quads-disney-spec0.0-rough0.05-k40.xml
      leafSamplingMode: Primitive
      enableSpecular: 0

  - name: disney_spec0.5_spherical_specoff
    params:
      geometry: quads-disney-spec0.5-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB
      enableSpecular: 0

  - name: disney_spec0.5_spherical_specon
    params:
      geometry: quads-disney-spec0.5-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB
      enableSpecular: 1

  - name: disney_spec1.0_anynode_specon
    params:
      geometry: quads-disney-spec1.0-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB_anyNode
      enableSpecular: 1

  - name: disney_spec1.0_anynode_uniform_off
    params:
      geometry: quads-disney-spec1.0-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB_anyNode
      enableSpecular: 1
      useUniformBVHSampling: 0

  - name: disney_spec1.0_anynode_defensive_1e-8
    params:
      geometry: quads-disney-spec1.0-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB_anyNode
      defensivePDF: 0.00000001

  - name: disney_spec1.0_anynode_lightcuts_on
    params:
      geometry: quads-disney-spec1.0-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB_anyNode
      enableLightcuts: true
      lightcutThreshold: 1.5

  - name: disney_bvhdepth_4
    params:
      geometry: quads-disney-spec1.0-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB_anyNode
      bvhMaxDepth: 4

  - name: disney_bvhdepth_10
    params:
      geometry: quads-disney-spec1.0-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB_anyNode
      bvhMaxDepth: 10

  - name: disney_bvhdepth_16
    params:
      geometry: quads-disney-spec1.0-rough0.05-k40.xml
      leafSamplingMode: SphericalAABB_anyNode
      bvhMaxDepth: 16
