# Experiment v11-cbox-n1: cbox with 1x1 tiles/wall (5 wall primitives total)
# Compares baseline path tracer vs our additionalvertex (doublestep) method.

docker:
  container: bdpt_twopoints_mitsuba-mitsuba-1
  workdir: /home/mitsuba
  setpath_script: /home/mitsuba/setpath.sh

scene: scenes/experiments/7_glints/glints_path_N10000_size0000100_mm00_ss00_r001_spp256.xml
output_root: scenes/experiments/7_glints/A

reference:
  inherit_config_params: false
  scene: scenes/experiments/7_glints/glints_path_N10000_size0000100_mm00_ss00_r001_spp256.xml
  spp: 16184
  geometry: done

spp_schedule: [4, 8, 16, 32, 64, 128, 256]
repetitions_per_spp: 3

global_defaults:
  integrator: glinttracer
  maxDepth: 1
  useBVH: true

analysis:
  baseline_config_name: baseline_path
  average_bbox: [0.0, 0.0, 1.0, 1.0]

named_configs:
  - name: baseline_path
    params:
      __scene: scenes/experiments/7_glints/glints_path_N10000_size0000100_mm00_ss00_r001_spp256.xml
      integrator: path
      maxDepth: 1
      rrDepth: 1
  - name: ours
    params:
      __scene: scenes/experiments/7_glints/glints_glinttracer_N10000_size0000100_mm00_ss00_r001_spp256.xml
      integrator: glinttracer
