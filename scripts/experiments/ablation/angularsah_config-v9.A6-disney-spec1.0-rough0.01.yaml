# Experiment v9.A6 — Sweep A, Scene 6: pure metallic, smooth (metal=1.0, spec=0, rough=0.05).
# No diffuse component, very narrow mirror-like specular lobe. Extreme worst case for
# diffuse_approx; tests the upper limit of what specular_approx can recover.

docker:
  container: bdpt_twopoints_mitsuba-mitsuba-1
  workdir: /home/mitsuba
  setpath_script: /home/mitsuba/setpath.sh

scene: scenes/experiments/3_wildcard_disney/wildcard_disney_quads.xml
output_root: scenes/experiments/3_wildcard_disney/results/newspec_angularsah_v9.A6_spec1.0_rough0.01

reference:
  inherit_config_params: true
  pre_rendered_exr: /home/nestor/bdpt_twopoints_mitsuba/scenes/experiments/3_wildcard_disney/wildcard_disney_quads_bdpt_20kspp_1.5min.exr
    #/home/nestor/bdpt_twopoints_mitsuba/scenes/experiments/3_wildcard_disney/results/angularsah_v9.A6_spec1.0_rough0.01/baseline_path/reference.exr
  scene: scenes/experiments/3_wildcard_disney/wildcard_disney_quads_pathref.xml
  spp: 100000
  exclude_params:
    - integrator
    - useBVH
    - disableNEE
    - doAdditionalVertex
    - maxLeafSize
    - leafSamplingMode
    - outputDebugCSV
    - enableLightcuts
    - lightcutThreshold
    - gaussianSAThreshold
    - useUniformBVHSampling
    - enableSpecular
    - enableFastLUT
    - defensivePDF



spp_schedule: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024] # , 256, 512, 1024]
repetitions_per_spp: 5

global_defaults:
  integrator: doublestep
  maxDepth: 3
  rrDepth: 5
  maxLeafSize: 2
  leafSamplingMode: Primitive
  useBVH: true
  disableNEE: false
  doAdditionalVertex: true
  outputDebugCSV: false
  enableLightcuts: false
  lightcutThreshold: 0
  gaussianSAThreshold: 0.031
  useUniformBVHSampling: 1 # 1 is no
  enableFastLUT: 1 # 1 to precompute gaussians (>1.5 evals the lut once at the cost of variance)
  defensivePDF: 0.000001
  geometry: quads-disney-spec1.0-rough0.01-k40.xml
  angularSAHWeight: 0.0
  bvhMaxDepth: 16


analysis:
  baseline_config_name: baseline_path
  average_bbox: [0.4, 0.7, 0.68, 0.98]
  figure_format: svg
  exposure_scale: .7


named_configs:
  - name: baseline_path
    params:
      __scene: scenes/experiments/3_wildcard_disney/wildcard_disney_quads_pathref.xml
      integrator: path
      maxDepth: 3
      rrDepth: 5

  # - name: bdpt
  #   params:
  #     integrator: bdpt
  #     __scene: scenes/experiments/2_wildcard_asteroids/wildcard_spotlight_pathref.xml

  - name: uniform
    params:
      enableSpecular: 0
      useUniformBVHSampling: 0

  - name: diffuse
    params:
      enableSpecular: 0
      ablateAlbedo: true
      
  - name: specular
    params:
      enableSpecular: 1
      
  # - name: specular_angularsah1 # really does nothing
  #   params:
  #     enableSpecular: 1
  #     angularSAHWeight: 1
      